<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
}

canvas{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
display:block;
}

/* 시작 */
#start{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:black;
z-index:10;
}

/* 캐릭 */
#chars{display:flex;gap:10px;margin:10px;}
.char{padding:10px;background:#222;border-radius:10px;}
.char.active{border:2px solid cyan;}

/* 스킬 */
#skills{
position:fixed;
right:20px;
bottom:20px;
display:none;
grid-template-columns:repeat(2,80px);
gap:10px;
}
.skill{
width:80px;height:80px;
border-radius:20px;
background:#1a2235;
color:white;
font-size:22px;
}

/* 조이스틱 */
#joy{
position:fixed;
left:20px;
bottom:20px;
width:120px;height:120px;
border-radius:50%;
background:#ffffff20;
display:none;
}
#stick{
width:60px;height:60px;
border-radius:50%;
background:#00e5ff;
margin:30px;
}
</style>
</head>

<body>

<div id="start">
<h1>VOID RUSH</h1>

<button onclick="platform='pc'">PC</button>
<button onclick="platform='mobile'">모바일</button>

<div id="chars"></div>

<button onclick="startGame()">START</button>
</div>

<canvas id="c"></canvas>

<div id="joy"><div id="stick"></div></div>

<div id="skills">
<button class="skill" onclick="skill(0)">⚔️</button>
<button class="skill" onclick="skill(1)">🌀</button>
<button class="skill" onclick="skill(2)">🎯</button>
<button class="skill" onclick="skill(3)">🔥</button>
</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* 화면 */
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.onresize=resize;

/* 상태 */
let platform=null,started=false;
let selected=null;

let mapW=2000,mapH=2000;
let camX=0,camY=0;

let player={
x:500,y:500,
speed:3,atk:10,
dirX:1,dirY:0,
step:0
};

let enemies=[],bullets=[];

/* 캐릭 */
let inv={warrior:1,ninja:1,sniper:1};

function drawChars(){
let d=document.getElementById("chars");
d.innerHTML="";
for(let k in inv){
let e=document.createElement("div");
e.className="char";
e.innerText=k;

if(selected===k)e.classList.add("active");

e.onclick=()=>{
selected=k;
applyChar();
drawChars();
};

d.appendChild(e);
}
}
drawChars();

/* 능력치 */
const stat={
warrior:{speed:2.5,atk:18},
ninja:{speed:4.8,atk:10},
sniper:{speed:3,atk:28}
};

function applyChar(){
let s=stat[selected];
player.speed=s.speed;
player.atk=s.atk;
}

/* 시작 */
function startGame(){
if(!platform||!selected)return alert("선택 먼저");

started=true;
document.getElementById("start").style.display="none";

if(platform==="mobile"){
document.getElementById("skills").style.display="grid";
document.getElementById("joy").style.display="block";
}

spawn();
}

/* 적 */
function spawn(){
enemies=[];
for(let i=0;i<6;i++){
enemies.push({
x:Math.random()*mapW,
y:Math.random()*mapH,
hp:30
});
}
}

/* 이동 */
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

/* 조이스틱 */
let jAct=false,jx=0,jy=0;
let joy=document.getElementById("joy");
let stick=document.getElementById("stick");

joy.addEventListener("touchstart",()=>jAct=true);
joy.addEventListener("touchmove",e=>{
let r=joy.getBoundingClientRect();
let x=e.touches[0].clientX-r.left-60;
let y=e.touches[0].clientY-r.top-60;
let d=Math.hypot(x,y);
if(d>40){x=x/d*40;y=y/d*40;}
jx=x/40;jy=y/40;
stick.style.transform=`translate(${x}px,${y}px)`;
});
joy.addEventListener("touchend",()=>{
jAct=false;jx=0;jy=0;
stick.style.transform="translate(0,0)";
});

function move(){
let sp=player.speed;

if(platform==="pc"){
if(keys["w"])player.y-=sp;
if(keys["s"])player.y+=sp;
if(keys["a"])player.x-=sp;
if(keys["d"])player.x+=sp;
}

if(platform==="mobile"&&jAct){
player.x+=jx*sp;
player.y+=jy*sp;
}

player.x=Math.max(0,Math.min(player.x,mapW));
player.y=Math.max(0,Math.min(player.y,mapH));
}

/* 공격 */
function shoot(mx,my){

let rect=c.getBoundingClientRect();

let tx=mx-rect.left+camX;
let ty=my-rect.top+camY;

let a=Math.atan2(ty-player.y,tx-player.x);

bullets.push({
x:player.x,y:player.y,
vx:Math.cos(a)*8,
vy:Math.sin(a)*8
});

player.dirX=Math.cos(a);
player.dirY=Math.sin(a);
}

c.onclick=e=>shoot(e.clientX,e.clientY);

c.addEventListener("touchstart",e=>{
let r=c.getBoundingClientRect();
shoot(e.touches[0].clientX,e.touches[0].clientY);
});

/* 스킬 */
function skill(i){

if(selected==="ninja"&&i===2){
player.x+=player.dirX*120;
player.y+=player.dirY*120;
}

if(selected==="warrior"&&i===3){
player.speed*=1.5;
setTimeout(()=>player.speed/=1.5,2000);
}
}

/* 업데이트 */
function update(){

if(!started)return;

move();

player.step+=0.2;

/* 카메라 */
camX=Math.max(0,Math.min(player.x-c.width/2,mapW-c.width));
camY=Math.max(0,Math.min(player.y-c.height/2,mapH-c.height));

/* 총알 */
bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;

enemies.forEach(e=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<15){
e.hp-=10;
}
});
});

enemies=enemies.filter(e=>e.hp>0);

if(enemies.length===0)spawn();
}

/* 플레이어 */
function drawPlayer(){

let bounce=Math.sin(player.step)*2;

ctx.save();
ctx.translate(player.x,player.y+bounce);

ctx.fillStyle="#00e5ff";
ctx.fillRect(-10,-10,20,20);

ctx.fillStyle="#fff";
ctx.fillRect(-6,-8,12,8);

ctx.fillStyle="#000";
ctx.fillRect(-3,-5,2,2);
ctx.fillRect(2,-5,2,2);

ctx.fillStyle="#0f0";
ctx.fillRect(10,-2,14,4);

ctx.restore();
}

/* draw */
function draw(){

/* 초기화 (중요🔥) */
ctx.setTransform(1,0,0,1,0,0);
ctx.clearRect(0,0,c.width,c.height);

/* 카메라 */
ctx.setTransform(1,0,0,1,-camX,-camY);

/* 배경 */
ctx.fillStyle="#2ecc71";
ctx.fillRect(0,0,mapW,mapH);

/* 패턴 */
for(let i=0;i<200;i++){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect((i*37)%mapW,(i*91)%mapH,2,2);
}

/* 플레이어 */
drawPlayer();

/* 적 */
ctx.fillStyle="red";
enemies.forEach(e=>{
ctx.fillRect(e.x-10,e.y-10,20,20);
});

/* 총알 */
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();
});
}

/* 루프 */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
