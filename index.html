<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body {margin:0; overflow:hidden; background:black; color:white;}
canvas {position:absolute;}

#startScreen {
position:absolute;
width:100%; height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
}

#joystick {
position:absolute;
bottom:50px; left:50px;
width:100px; height:100px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick {
width:40px; height:40px;
background:cyan;
border-radius:50%;
position:absolute;
top:30px; left:30px;
}
</style>
</head>

<body>

<div id="startScreen">
<h1 style="color:#0ff;">VOID RUSH</h1>
<button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== 데이터 =====
let player={x:500,y:500,hp:100,level:1,exp:0,atk:10};
let enemies=[];
let wave=1;

// ===== 저장 =====
function save(){
localStorage.setItem("save",JSON.stringify(player));
}
function load(){
let s=localStorage.getItem("save");
if(s) player=JSON.parse(s);
}
load();

// ===== VIP =====
let vip={lastMonth:null};
function checkVIP(){
let now=new Date();
let key=now.getFullYear()+"-"+now.getMonth();

if(now.getDate()==1 && vip.lastMonth!==key){
player.atk+=5;
vip.lastMonth=key;
}
}
setInterval(checkVIP,5000);

// ===== 시작 =====
function startGame(){
document.getElementById("startScreen").style.display="none";
spawnWave();
}

// ===== 웨이브 =====
function spawnWave(){
enemies=[];
for(let i=0;i<wave+2;i++){
enemies.push({
x:Math.random()*2000,
y:Math.random()*2000,
hp:50+wave*20
});
}
}

// ===== AI =====
function enemyAI(){
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist>5){
e.x+=dx/dist*2;
e.y+=dy/dist*2;
}

if(dist<30){
player.hp-=0.2;
}
});
}

// ===== 공격 =====
canvas.addEventListener("click",()=>{
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;

if(Math.sqrt(dx*dx+dy*dy)<60){
e.hp-=player.atk;
showDamage(e.x,e.y,player.atk);
}
});
});

// ===== 레벨 =====
function giveExp(){
player.exp+=20;

if(player.exp>=player.level*50){
player.exp=0;
player.level++;
player.atk+=2;
}
}

// ===== 데미지 =====
let dmgTexts=[];
function showDamage(x,y,d){
dmgTexts.push({x,y,text:d,life:30});
}

// ===== 조이스틱 =====
let joy=document.getElementById("joystick");
let stick=document.getElementById("stick");

joy.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
let rect=joy.getBoundingClientRect();

let dx=t.clientX-rect.left-50;
let dy=t.clientY-rect.top-50;

player.x+=dx*0.05;
player.y+=dy*0.05;

stick.style.left=(dx+50-20)+"px";
stick.style.top=(dy+50-20)+"px";
});

joy.addEventListener("touchend",()=>{
stick.style.left="30px";
stick.style.top="30px";
});

// ===== 키보드 =====
document.addEventListener("keydown",(e)=>{
if(e.key==="w")player.y-=10;
if(e.key==="s")player.y+=10;
if(e.key==="a")player.x-=10;
if(e.key==="d")player.x+=10;
});

// ===== 카메라 =====
let camera={x:0,y:0};
function updateCamera(){
camera.x=player.x-canvas.width/2;
camera.y=player.y-canvas.height/2;
}

// ===== 루프 =====
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

updateCamera();
ctx.setTransform(1,0,0,1,0,0);
ctx.translate(-camera.x,-camera.y);

// 플레이어
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,20,20);

// 적
enemies=enemies.filter(e=>{
if(e.hp<=0){giveExp();return false;}
return true;
});

enemies.forEach(e=>{
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,20,20);
});

// 데미지 텍스트
dmgTexts.forEach((d,i)=>{
ctx.fillStyle="yellow";
ctx.fillText(d.text,d.x,d.y-d.life);
d.life--;
if(d.life<=0)dmgTexts.splice(i,1);
});

// AI
enemyAI();

// 웨이브
if(enemies.length===0){
wave++;
spawnWave();
}

// UI
ctx.fillStyle="white";
ctx.fillText("HP:"+Math.floor(player.hp),10,20);
ctx.fillText("Lv:"+player.level,10,40);
ctx.fillText("Wave:"+wave,10,60);

// 저장
save();

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
