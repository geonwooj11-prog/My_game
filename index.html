<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body {margin:0; overflow:hidden; background:black; color:white;}

#startScreen {
position:absolute;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:10;
}

#joystick {
position:absolute;
bottom:50px; left:50px;
width:120px; height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick {
width:40px; height:40px;
background:cyan;
border-radius:50%;
position:absolute;
top:40px; left:40px;
}
</style>
</head>

<body>

<div id="startScreen">
<h1 style="color:#0ff;">VOID RUSH</h1>
<button onclick="startGame()">START</button>
</div>

<canvas id="game" style="display:none;"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 화면 =====
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== 데이터 =====
let player = {x:500, y:500, hp:100, atk:10};
let enemies = [];
let wave = 1;

// ===== 시작 =====
function startGame(){
  document.getElementById("startScreen").style.display="none";
  canvas.style.display="block";
  spawnWave();
}

// ===== 적 생성 =====
function spawnWave(){
  enemies = [];
  for(let i=0;i<wave+2;i++){
    enemies.push({
      x:Math.random()*1500,
      y:Math.random()*1500,
      hp:50
    });
  }
}

// ===== 공격 =====
function basicAttack(){
  enemies.forEach(e=>{
    let dx = player.x - e.x;
    let dy = player.y - e.y;

    if(Math.sqrt(dx*dx+dy*dy) < 60){
      e.hp -= player.atk;
    }
  });
}

canvas.addEventListener("click", basicAttack);
canvas.addEventListener("touchstart", basicAttack);

// ===== 조이스틱 =====
let joy = document.getElementById("joystick");

let moveX = 0;
let moveY = 0;

joy.addEventListener("touchmove", e=>{
  let t = e.touches[0];
  let rect = joy.getBoundingClientRect();

  let dx = t.clientX - (rect.left + rect.width/2);
  let dy = t.clientY - (rect.top + rect.height/2);

  moveX = dx * 0.1;
  moveY = dy * 0.1;
});

joy.addEventListener("touchend", ()=>{
  moveX = 0;
  moveY = 0;
});

// ===== PC 이동 =====
document.addEventListener("keydown", e=>{
  if(e.key==="w") player.y -= 10;
  if(e.key==="s") player.y += 10;
  if(e.key==="a") player.x -= 10;
  if(e.key==="d") player.x += 10;
});

// ===== 카메라 =====
let camera = {x:0, y:0};

function updateCamera(){
  camera.x = player.x - canvas.width/2;
  camera.y = player.y - canvas.height/2;
}

// ===== AI =====
function enemyAI(){
  enemies.forEach(e=>{
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx+dy*dy);

    if(dist > 5){
      e.x += dx/dist * 2;
      e.y += dy/dist * 2;
    }

    if(dist < 30){
      player.hp -= 0.2;
    }
  });
}

// ===== 루프 =====
function draw(){

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 이동 적용
  player.x += moveX;
  player.y += moveY;

  updateCamera();
  ctx.translate(-camera.x, -camera.y);

  // 플레이어
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x, player.y, 25, 25);

  // 적
  enemies = enemies.filter(e => e.hp > 0);

  enemies.forEach(e=>{
    ctx.fillStyle="red";
    ctx.fillRect(e.x, e.y, 25, 25);
  });

  // AI
  enemyAI();

  // 웨이브
  if(enemies.length === 0){
    wave++;
    spawnWave();
  }

  // UI
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle="white";
  ctx.fillText("HP: " + Math.floor(player.hp), 20, 30);
  ctx.fillText("Wave: " + wave, 20, 50);

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
