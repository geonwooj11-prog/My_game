<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body{margin:0;overflow:hidden;background:#05070d;color:white;font-family:Arial;}
canvas{position:fixed;inset:0;}

#startScreen{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
flex-direction:column;background:black;
}

#hud{position:fixed;top:10px;left:10px;width:220px;}
.bar{height:20px;background:#111;border-radius:999px;border:2px solid #000;}
.fill{
height:100%;
background:linear-gradient(90deg,#ff3d3d,#ff9a5a);
box-shadow:0 0 10px rgba(255,80,80,0.6);
}

#skills{position:fixed;right:20px;bottom:20px;}

.skill-btn{
width:80px;height:80px;border-radius:20px;margin:5px;
background:radial-gradient(circle,#1f2f4d,#0a1220);
color:white;font-weight:bold;
box-shadow:0 6px 12px rgba(0,0,0,0.5);
}

#joystickBase{
position:fixed;bottom:30px;left:30px;
width:120px;height:120px;border-radius:50%;
background:radial-gradient(circle,#ffffff15,#ffffff05);
}

#joystickStick{
width:60px;height:60px;border-radius:50%;
background:radial-gradient(circle,#00e5ff,#0088ff);
margin:30px;
}

/* 컷씬 */
#skillCut{
position:fixed;top:20px;left:-350px;
width:300px;height:90px;
display:flex;align-items:center;
background:linear-gradient(90deg,#111,#222);
border-left:6px solid #00e5ff;
border-radius:12px;padding:10px;gap:10px;
transition:0.4s;
}
#skillCut.show{left:10px;}
#cutImg{width:70px;height:70px;border-radius:10px;}
</style>
</head>

<body>

<div id="startScreen">
<h1>VOID RUSH</h1>
<button onclick="startGame()">START</button>
</div>

<div id="hud">
<div class="bar"><div id="hpFill" class="fill"></div></div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystickStick"></div></div>

<div id="skills">
<button class="skill-btn" onclick="useSkill(0)">Q</button>
<button class="skill-btn" onclick="useSkill(1)">E</button>
<button class="skill-btn" onclick="useSkill(2)">R</button>
<button class="skill-btn" onclick="useSkill(3)">F</button>
</div>

<div id="skillCut">
<img id="cutImg">
<div id="cutSkill"></div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* 사운드 */
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f){let o=audioCtx.createOscillator();let g=audioCtx.createGain();o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination);g.gain.value=0.05;o.start();o.stop(audioCtx.currentTime+0.05);}

/* 상태 */
let skillSlow=0;

/* 플레이어 */
let player={x:300,y:300,hp:100,speed:3,dirX:1,dirY:0,job:"warrior",rage:0,zoom:false,mode:"ranged"};

/* 펫 */
let pet={x:0,y:0,a:0};

/* 데이터 */
let enemies=[];
let bullets=[];

/* 시작 */
function startGame(){
document.getElementById("startScreen").style.display="none";
enemies=[];bullets=[];
spawnEnemies();
}

/* 적 */
function spawnEnemies(){
for(let i=0;i<6;i++){
enemies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
hp:40,
type:Math.random()<0.5?"melee":"ranged"
});
}
}

/* ===== 조이스틱 ===== */
let joyActive=false,joyX=0,joyY=0;
const base=document.getElementById("joystickBase");
const stick=document.getElementById("joystickStick");

base.addEventListener("touchstart",()=>joyActive=true);

base.addEventListener("touchmove",e=>{
if(!joyActive)return;
const r=base.getBoundingClientRect();
let x=e.touches[0].clientX-r.left-60;
let y=e.touches[0].clientY-r.top-60;
let d=Math.hypot(x,y);
if(d>40){x=x/d*40;y=y/d*40;}
joyX=x/40;joyY=y/40;
stick.style.transform=`translate(${x}px,${y}px)`;
});

base.addEventListener("touchend",()=>{
joyActive=false;joyX=0;joyY=0;
stick.style.transform=`translate(0,0)`;
});

/* 키보드 */
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

/* 이동 */
function move(){
let sp=player.speed;
if(player.rage>0) sp*=1.4;

if(joyActive){
player.x+=joyX*sp;
player.y+=joyY*sp;
player.dirX=joyX;player.dirY=joyY;
}

if(keys["w"]) {player.y-=sp; player.dirY=-1;}
if(keys["s"]) {player.y+=sp; player.dirY=1;}
if(keys["a"]) {player.x-=sp; player.dirX=-1;}
if(keys["d"]) {player.x+=sp; player.dirX=1;}
}

/* 공격 (터치 방향) */
canvas.addEventListener("click",e=>{
let r=canvas.getBoundingClientRect();
let mx=e.clientX-r.left;
let my=e.clientY-r.top;
let a=Math.atan2(my-player.y,mx-player.x);

bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:10});
tone(500);
});

/* 컷씬 */
function showCut(text){
skillSlow=20;
let cut=document.getElementById("skillCut");
document.getElementById("cutSkill").innerText=text;
cut.classList.add("show");
setTimeout(()=>cut.classList.remove("show"),1200);
}

/* 스킬 */
function useSkill(i){

if(player.job==="warrior"&&i===3){
player.rage=120;
showCut("🔥 RAGE");
tone(150);
}

if(player.job==="sniper"&&i===2){
player.zoom=!player.zoom;
showCut("🎯 ZOOM");
}

if(player.job==="ninja"&&i===2){
player.mode=player.mode==="melee"?"ranged":"melee";
showCut("⚡ SWITCH");
}
}

/* 데미지 */
function hit(e,d){
let crit=Math.random()<0.2;
if(crit){d*=2;tone(800);}
e.hp-=d;
}

/* 펫 */
function updatePet(){
pet.a+=0.05;
pet.x=player.x+Math.cos(pet.a)*30;
pet.y=player.y+Math.sin(pet.a)*30;

let t=enemies[0];
if(t){
let a=Math.atan2(t.y-pet.y,t.x-pet.x);
bullets.push({x:pet.x,y:pet.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:5});
}
}

/* 업데이트 */
function update(){

move();

if(player.rage>0) player.rage--;
if(skillSlow>0) skillSlow--;

let slow=skillSlow>0?0.3:1;

bullets.forEach(b=>{
b.x+=b.vx*slow;
b.y+=b.vy*slow;

enemies.forEach(e=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<20){
hit(e,b.dmg);
}
});
});

enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let d=Math.hypot(dx,dy);

if(e.type==="melee"){
e.x+=dx/d*1.5*slow;
e.y+=dy/d*1.5*slow;
}else{
if(d<150){
e.x-=dx/d*slow;
e.y-=dy/d*slow;
}
}
});

enemies=enemies.filter(e=>e.hp>0);
if(enemies.length===0) spawnEnemies();

updatePet();
}

/* 그리기 */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// player
ctx.fillStyle=player.rage>0?"red":"cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,15,0,Math.PI*2);
ctx.fill();

// pet
ctx.fillStyle="#00e5ff";
ctx.beginPath();
ctx.arc(pet.x,pet.y,6,0,Math.PI*2);
ctx.fill();

// enemies
enemies.forEach(e=>{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(e.x,e.y,12,0,Math.PI*2);
ctx.fill();
});

// bullets
bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

// 암전
if(skillSlow>0){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

document.getElementById("hpFill").style.width=player.hp+"%";
}

/* 루프 */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* 버튼 효과 */
document.querySelectorAll(".skill-btn").forEach(btn=>{
btn.addEventListener("touchstart",()=>btn.style.transform="scale(0.85)");
btn.addEventListener("touchend",()=>btn.style.transform="scale(1)");
});
</script>

</body>
</html>
