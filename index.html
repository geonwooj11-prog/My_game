<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body{margin:0;overflow:hidden;background:#05070d;color:white;font-family:Arial;}
canvas{position:fixed;inset:0;}

/* 시작 */
#startScreen{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:black;z-index:10;
}

#charSelect{display:flex;gap:10px;margin-bottom:20px;}
.char{padding:10px 14px;border-radius:10px;background:#222;border:2px solid transparent;}
.char.active{border-color:#00e5ff;background:#0a1a2a;}

#hud{position:fixed;top:10px;left:10px;width:220px;display:none;}
.bar{height:20px;background:#111;border-radius:999px;border:2px solid #000;}
.fill{height:100%;background:linear-gradient(90deg,#ff3d3d,#ff9a5a);}

#skills{
position:fixed;right:15px;bottom:20px;
display:grid;grid-template-columns:repeat(2,80px);
gap:10px;display:none;
}
.skill-btn{width:80px;height:80px;border-radius:20px;background:#1a2235;color:white;}

#joystickBase{
position:fixed;bottom:20px;left:20px;
width:120px;height:120px;border-radius:50%;
background:#ffffff15;display:none;
}
#joystickStick{width:60px;height:60px;border-radius:50%;background:#00e5ff;margin:30px;}

#skillCut{
position:fixed;top:20px;left:-300px;
width:250px;height:80px;
background:#111;border-left:5px solid #00e5ff;
display:flex;align-items:center;padding:10px;
transition:0.4s;
}
#skillCut.show{left:10px;}
</style>
</head>

<body>

<div id="startScreen">
<h1>VOID RUSH</h1>

<div id="charSelect"></div>

<button onclick="gacha()">가챠</button>
<button onclick="startGame()">START</button>
</div>

<div id="hud">
<div class="bar"><div id="hpFill" class="fill"></div></div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystickStick"></div></div>

<div id="skills">
<button class="skill-btn" onclick="useSkill(0)">Q</button>
<button class="skill-btn" onclick="useSkill(1)">E</button>
<button class="skill-btn" onclick="useSkill(2)">R</button>
<button class="skill-btn" onclick="useSkill(3)">F</button>
</div>

<div id="skillCut"><div id="cutSkill"></div></div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* ===== 저장 ===== */
let inventory={warrior:1,ninja:0,sniper:0};
let selectedChar=null;

function saveGame(){
localStorage.setItem("void",JSON.stringify({inventory,selectedChar}));
}
function loadGame(){
let d=localStorage.getItem("void");
if(!d)return;
let s=JSON.parse(d);
inventory=s.inventory||inventory;
selectedChar=s.selectedChar||null;
}
loadGame();

/* ===== 캐릭 UI ===== */
function renderChars(){
let div=document.getElementById("charSelect");
div.innerHTML="";
for(let k in inventory){
if(inventory[k]>0){
let el=document.createElement("div");
el.className="char";
el.innerText=k+"("+inventory[k]+")";
el.onclick=()=>{
selectedChar=k;player.job=k;
document.querySelectorAll(".char").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
saveGame();
};
div.appendChild(el);

/* 각성 */
if(inventory[k]>=3){
let b=document.createElement("button");
b.innerText="각성";
b.onclick=()=>awaken(k);
div.appendChild(b);
}
}
}
}
renderChars();

/* ===== 가챠 ===== */
function gacha(){
let r=Math.random();
let p=r<0.5?"warrior":r<0.85?"ninja":"sniper";
inventory[p]++;
alert("획득:"+p);
saveGame();
renderChars();
}

/* ===== 각성 ===== */
const awakenMap={warrior:"warrior_awaken",ninja:"ninja_awaken",sniper:"sniper_awaken"};
function awaken(k){
if(inventory[k]<3)return;
inventory[k]-=3;
inventory[awakenMap[k]]=(inventory[awakenMap[k]]||0)+1;
alert("각성:"+awakenMap[k]);
saveGame();
renderChars();
}

/* ===== 게임 상태 ===== */
let gameStarted=false,skillSlow=0,wave=1;
let player={x:300,y:300,hp:100,speed:3,job:null,rage:0,zoom:false,mode:"ranged"};
let enemies=[],bullets=[],pet={x:0,y:0,a:0};

/* 시작 */
function startGame(){
if(!selectedChar)return alert("캐릭 선택");
gameStarted=true;
document.getElementById("startScreen").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("skills").style.display="grid";
document.getElementById("joystickBase").style.display="block";
spawn();
}

/* 적 + 보스 */
function spawn(){
if(wave%5===0){
enemies.push({x:400,y:100,hp:300,type:"boss",size:25});
return;
}
for(let i=0;i<6;i++){
enemies.push({x:Math.random()*800,y:Math.random()*600,hp:40,type:"melee",size:12});
}
}

/* 입력 */
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

/* 이동 */
function move(){
if(!gameStarted)return;
let sp=player.speed*(player.rage>0?1.4:1);
if(keys["w"])player.y-=sp;
if(keys["s"])player.y+=sp;
if(keys["a"])player.x-=sp;
if(keys["d"])player.x+=sp;
}

/* 공격 */
canvas.onclick=e=>{
if(!gameStarted)return;
let r=canvas.getBoundingClientRect();
let a=Math.atan2(e.clientY-player.y,e.clientX-player.x);
bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:10});
};

/* 스킬 */
function useSkill(i){
if(!gameStarted)return;
if(player.job==="warrior"&&i===3){player.rage=120;cut("RAGE");}
}

/* 컷씬 */
function cut(t){
skillSlow=20;
let c=document.getElementById("skillCut");
document.getElementById("cutSkill").innerText=t;
c.classList.add("show");
setTimeout(()=>c.classList.remove("show"),1200);
}

/* 전투 */
function hit(e,d){
if(Math.random()<0.2)d*=2;
e.hp-=d;
}

/* 업데이트 */
function update(){
if(!gameStarted)return;
move();

bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;
enemies.forEach(e=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<20)hit(e,b.dmg);
});
});

enemies=enemies.filter(e=>e.hp>0);

if(enemies.length===0){
wave++;
if(Math.random()<0.4)gacha();
spawn();
}
}

/* draw */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* player */
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,15,0,Math.PI*2);
ctx.fill();

/* enemies */
enemies.forEach(e=>{
ctx.fillStyle=e.type==="boss"?"purple":"red";
ctx.beginPath();
ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
ctx.fill();
});

/* bullets */
bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

/* wave */
ctx.fillStyle="white";
ctx.fillText("WAVE:"+wave,20,40);
}

/* loop */
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
