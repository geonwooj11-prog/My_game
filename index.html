<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{position:fixed;inset:0;}

#startScreen{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:black;z-index:10;color:white;
}

.main-btn{
padding:14px 28px;
border-radius:16px;
background:linear-gradient(#ffcc00,#ff8800);
border:3px solid #000;
font-weight:bold;
margin:5px;
}

#charSelect{display:flex;gap:10px;margin:10px;}
.char{padding:10px;background:#222;border-radius:10px;}
.char.active{border:2px solid cyan;}

#skills{
position:fixed;right:20px;bottom:20px;
display:grid;grid-template-columns:repeat(2,80px);
gap:10px;display:none;
}
.skill-btn{width:80px;height:80px;border-radius:20px;background:#1a2235;color:white;}

#joystickBase{
position:fixed;bottom:20px;left:20px;
width:120px;height:120px;border-radius:50%;
background:#ffffff10;display:none;
}
#joystickStick{
width:60px;height:60px;border-radius:50%;
background:#00e5ff;margin:30px;
}

#shop{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;padding:20px;border-radius:10px;color:white;
transition:0.2s;
}
#shop.show{transform:translate(-50%,-50%) scale(1);}

#skillCut{
position:fixed;top:20px;left:-300px;
background:#111;color:white;padding:10px;
transition:0.3s;
}
#skillCut.show{left:10px;}
</style>
</head>

<body>

<div id="startScreen">
<h1>VOID RUSH</h1>

<button class="main-btn" onclick="setPlatform('pc')">PC</button>
<button class="main-btn" onclick="setPlatform('mobile')">모바일</button>

<div id="charSelect"></div>

<button class="main-btn" onclick="gacha()">가챠</button>
<button class="main-btn" onclick="buyBox()">상자 구매</button>
<button class="main-btn" onclick="openBox()">상자 열기</button>
<button class="main-btn" onclick="openShop()">상점</button>
<button class="main-btn" onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystickStick"></div></div>

<div id="skills">
<button class="skill-btn" onclick="useSkill(0)">Q</button>
<button class="skill-btn" onclick="useSkill(1)">E</button>
<button class="skill-btn" onclick="useSkill(2)">R</button>
<button class="skill-btn" onclick="useSkill(3)">F</button>
</div>

<div id="shop">
<button onclick="buyGacha()">가챠(10💎)</button>
<button onclick="heal()">회복(5💎)</button>
<button onclick="closeShop()">닫기</button>
</div>

<div id="skillCut"><div id="cutSkill"></div></div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* 상태 */
let platform=null,gameStarted=false;
let inventory={warrior:1,ninja:0,sniper:0};
let selectedChar=null,diamonds=0,boxes=0;

let mapWidth=2000,mapHeight=2000;
let camX=0,camY=0;

let player={x:500,y:500,hp:100,speed:3,job:null,atk:10,dirX:1,dirY:0};
let enemies=[],bullets=[],enemyBullets=[],obstacles=[];
let cooldowns=[0,0,0,0];

let effects=[];
let screenShake=0,flash=0,slowTime=0;

let ulti={active:false,time:0,zoom:1};

let pet={x:0,y:0,angle:0,type:null};

/* 능력치 */
const charStats={
warrior:{hp:140,speed:2.5,atk:18},
ninja:{hp:80,speed:4.8,atk:10},
sniper:{hp:70,speed:3,atk:28}
};

/* 사운드 */
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playSound(f){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;
o.connect(g);g.connect(audioCtx.destination);
g.gain.value=0.05;
o.start();o.stop(audioCtx.currentTime+0.1);
}

/* 플랫폼 */
function setPlatform(p){platform=p;}

/* 캐릭 */
function renderChars(){
let div=document.getElementById("charSelect");
div.innerHTML="";
for(let k in inventory){
if(inventory[k]>0){
let el=document.createElement("div");
el.className="char";
el.innerText=k;
if(selectedChar===k)el.classList.add("active");
el.onclick=()=>{
selectedChar=k;
player.job=k;
applyChar();
setPet();
renderChars();
};
div.appendChild(el);
}}}
renderChars();

function applyChar(){
let s=charStats[player.job];
player.hp=s.hp;
player.speed=s.speed;
player.atk=s.atk;
}

/* 상자 */
function buyBox(){if(diamonds>=10){diamonds-=10;boxes++;}}
function openBox(){
if(boxes<=0)return alert("상자 없음");
boxes--;
let r=Math.random();
let p=r<0.5?"warrior":r<0.85?"ninja":"sniper";
inventory[p]=(inventory[p]||0)+1;
renderChars();
alert("획득:"+p);
}

/* 상점 */
function openShop(){document.getElementById("shop").classList.add("show");}
function closeShop(){document.getElementById("shop").classList.remove("show");}
function buyGacha(){if(diamonds>=10){diamonds-=10;gacha();}}
function heal(){if(diamonds>=5){diamonds-=5;player.hp=100;}}

/* 가챠 */
function gacha(){
let r=Math.random();
let p=r<0.5?"warrior":r<0.85?"ninja":"sniper";
inventory[p]++;renderChars();
}

/* 시작 */
function startGame(){
if(!platform||!selectedChar)return alert("선택 먼저");
gameStarted=true;
document.getElementById("startScreen").style.display="none";
document.getElementById("skills").style.display="grid";
createMap();spawn();
}

/* 맵 */
function createMap(){
obstacles=[];
for(let i=0;i<30;i++){
obstacles.push({x:Math.random()*mapWidth,y:Math.random()*mapHeight,size:30});
}
}

/* 적 */
function spawn(){
enemies=[];
for(let i=0;i<6;i++){
enemies.push({x:Math.random()*mapWidth,y:Math.random()*mapHeight,hp:40});
}
}

/* 이동 */
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function move(){
let sp=player.speed;
if(keys["w"])player.y-=sp;
if(keys["s"])player.y+=sp;
if(keys["a"])player.x-=sp;
if(keys["d"])player.x+=sp;
}

/* 공격 */
function shoot(mx,my){
let a=Math.atan2(my-player.y,mx-player.x);
bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:player.atk});
playSound(500);
}
canvas.onclick=e=>shoot(e.clientX,e.clientY);

/* 스킬 + 궁극기 */
function useSkill(i){
if(cooldowns[i]>0)return;
cooldowns[i]=60;

if(i===3){
ulti.active=true;
ulti.time=40;
ulti.zoom=1.5;
flash=10;screenShake=15;
}
}

/* 펫 */
function setPet(){
if(player.job==="warrior")pet.type="fire";
if(player.job==="ninja")pet.type="shadow";
if(player.job==="sniper")pet.type="drone";
}

function updatePet(){
pet.angle+=0.05;
pet.x=player.x+Math.cos(pet.angle)*30;
pet.y=player.y+Math.sin(pet.angle)*30;
}

/* 업데이트 */
function update(){

move();
updatePet();

cooldowns=cooldowns.map(c=>c>0?c-1:0);

camX=player.x-canvas.width/2;
camY=player.y-canvas.height/2;

bullets.forEach(b=>{
b.x+=b.vx;b.y+=b.vy;
enemies.forEach(e=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<20)e.hp-=b.dmg;
});
});

enemies=enemies.filter(e=>e.hp>0);

if(enemies.length===0)spawn();

if(ulti.active){
ulti.time--;
if(ulti.time<=0){ulti.active=false;ulti.zoom=1;}
}

}

/* draw */
function draw(){

ctx.setTransform(ulti.zoom,0,0,ulti.zoom,-camX,-camY);

// 맵
ctx.fillStyle="#2ecc71";
ctx.fillRect(0,0,mapWidth,mapHeight);

// 플레이어
ctx.fillStyle="cyan";
ctx.fillRect(player.x-10,player.y-10,20,20);

// 적
ctx.fillStyle="red";
enemies.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,10,0,Math.PI*2);
ctx.fill();
});

// 총알
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();
});

ctx.setTransform(1,0,0,1,0,0);

// 미니맵
ctx.fillStyle="black";
ctx.fillRect(canvas.width-160,10,150,150);

ctx.fillStyle="cyan";
ctx.fillRect(canvas.width-160+(player.x/mapWidth)*150,10+(player.y/mapHeight)*150,4,4);

if(flash>0){
ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);
flash--;
}

screenShake*=0.8;
}

/* 루프 */
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
