<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUSH</title>

<style>
body{margin:0;overflow:hidden;background:#05070d;color:white;font-family:Arial;}
canvas{position:fixed;inset:0;}

#startScreen{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
flex-direction:column;background:black;
}

#hud{position:fixed;top:10px;left:10px;width:220px;}
.bar{height:18px;background:#111;border-radius:999px;}
.fill{height:100%;background:linear-gradient(90deg,#ff3d3d,#ff9a5a);}

#skills{position:fixed;right:20px;bottom:20px;}
.skill-btn{width:70px;height:70px;border-radius:20px;margin:5px;font-size:18px;}

#joystickBase{
position:fixed;bottom:30px;left:30px;
width:120px;height:120px;border-radius:50%;
background:#ffffff10;
}
#joystickStick{
width:60px;height:60px;border-radius:50%;
background:#00e5ff;margin:30px;
}

/* 컷씬 */
#skillCut{
position:fixed;top:20px;left:-350px;
width:300px;height:90px;
display:flex;align-items:center;
background:linear-gradient(90deg,#111,#222);
border-left:6px solid #00e5ff;
border-radius:12px;padding:10px;gap:10px;
transition:0.4s;
}
#skillCut.show{left:10px;}
#cutImg{width:70px;height:70px;border-radius:10px;}
#cutText{display:flex;flex-direction:column;}
#cutSkill{font-size:18px;font-weight:bold;}
</style>
</head>

<body>

<div id="startScreen">
<h1>VOID RUSH</h1>
<button onclick="startGame()">START</button>
</div>

<div id="hud">
<div class="bar"><div id="hpFill" class="fill"></div></div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystickStick"></div></div>

<div id="skills">
<button class="skill-btn" onclick="useSkill(0)">Q</button>
<button class="skill-btn" onclick="useSkill(1)">E</button>
<button class="skill-btn" onclick="useSkill(2)">R</button>
<button class="skill-btn" onclick="useSkill(3)">F</button>
</div>

<div id="skillCut">
<img id="cutImg">
<div id="cutText">
<div id="cutSkill"></div>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* 사운드 */
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t=0.05){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination);
g.gain.value=0.05;o.start();o.stop(audioCtx.currentTime+t);
}

/* 이미지 */
const imgs={
warrior:new Image(),
ninja:new Image(),
sniper:new Image()
};
imgs.warrior.src="https://i.imgur.com/7yUvePI.png";
imgs.ninja.src="https://i.imgur.com/JlVoG7b.png";
imgs.sniper.src="https://i.imgur.com/Z6X9F7Z.png";

/* 상태 */
let skillSlow=0;

/* 플레이어 */
let player={
x:300,y:300,hp:100,speed:3,
dirX:1,dirY:0,
job:"warrior",
rage:0,
zoom:false,
mode:"ranged"
};

/* 펫 */
let pet={x:0,y:0,a:0};

/* 데이터 */
let enemies=[];
let bullets=[];

/* 시작 */
function startGame(){
document.getElementById("startScreen").style.display="none";
spawnEnemies();
}

/* 적 */
function spawnEnemies(){
for(let i=0;i<6;i++){
enemies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
hp:40,
type:Math.random()<0.5?"melee":"ranged"
});
}
}

/* 이동 */
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function move(){
let sp=player.speed;
if(player.rage>0) sp*=1.4;
if(keys["w"]) player.y-=sp;
if(keys["s"]) player.y+=sp;
if(keys["a"]) player.x-=sp;
if(keys["d"]) player.x+=sp;
}

/* 공격 */
canvas.onclick=()=>{
let a=Math.atan2(player.dirY||0,player.dirX||1);
bullets.push({
x:player.x,y:player.y,
vx:Math.cos(a)*8,
vy:Math.sin(a)*8,
dmg:10
});
tone(500);
};

/* 컷씬 */
function showCut(text){
skillSlow=20;
let cut=document.getElementById("skillCut");
document.getElementById("cutSkill").innerText=text;
document.getElementById("cutImg").src=imgs[player.job].src;
cut.classList.add("show");
setTimeout(()=>cut.classList.remove("show"),1200);
}

/* 스킬 */
function useSkill(i){

if(player.job==="warrior"&&i===3){
player.rage=120;
showCut("🔥 RAGE");
tone(150);
}

if(player.job==="sniper"&&i===2){
player.zoom=!player.zoom;
showCut("🎯 ZOOM");
}

if(player.job==="ninja"&&i===2){
player.mode=player.mode==="melee"?"ranged":"melee";
showCut("⚡ SWITCH");
}
}

/* 데미지 */
function hit(e,d){
let crit=Math.random()<0.2;
if(crit){d*=2;tone(800);}
e.hp-=d;
}

/* 펫 */
function updatePet(){
pet.a+=0.05;
pet.x=player.x+Math.cos(pet.a)*30;
pet.y=player.y+Math.sin(pet.a)*30;

let t=enemies[0];
if(t){
let a=Math.atan2(t.y-pet.y,t.x-pet.x);
bullets.push({x:pet.x,y:pet.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:5});
}
}

/* 업데이트 */
function update(){

move();

if(player.rage>0) player.rage--;
if(skillSlow>0) skillSlow--;

let slow=skillSlow>0?0.3:1;

bullets.forEach(b=>{
b.x+=b.vx*slow;
b.y+=b.vy*slow;

enemies.forEach(e=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<20){
hit(e,b.dmg);
}
});
});

enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let d=Math.hypot(dx,dy);

if(e.type==="melee"){
e.x+=dx/d*1.5*slow;
e.y+=dy/d*1.5*slow;
}else{
if(d<150){
e.x-=dx/d*slow;
e.y-=dy/d*slow;
}
}
});

enemies=enemies.filter(e=>e.hp>0);
if(enemies.length===0) spawnEnemies();

updatePet();
}

/* 그리기 */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// player
let img=imgs[player.job];
if(img.complete){
ctx.drawImage(img,player.x-20,player.y-20,40,40);
}

// pet
ctx.fillStyle="#00e5ff";
ctx.beginPath();
ctx.arc(pet.x,pet.y,6,0,Math.PI*2);
ctx.fill();

// enemies
enemies.forEach(e=>{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(e.x,e.y,12,0,Math.PI*2);
ctx.fill();
});

// bullets
bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

// 암전
if(skillSlow>0){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

document.getElementById("hpFill").style.width=player.hp+"%";
}

/* 루프 */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
